<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Phren — Student</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: { sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"] },
          colors: { brand: { 400: "#818cf8", 500: "#6366f1", 600: "#4f46e5", 700: "#4338ca" } },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    .screen { animation: fade-in 0.3s ease both; }
    @keyframes fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .option-btn { transition: all 0.15s ease; }
    .option-btn.selected { border-color: #6366f1; background: rgba(99,102,241,0.12); }
    .option-btn.correct { border-color: #22c55e; background: rgba(34,197,94,0.1); }
    .option-btn.wrong { border-color: #ef4444; background: rgba(239,68,68,0.1); }
  </style>
</head>

<body class="min-h-screen bg-slate-950 text-slate-200 font-sans antialiased">
  <div class="pointer-events-none fixed inset-0 -z-10 opacity-40"
       style="background: radial-gradient(60% 50% at 20% 0%, rgba(99,102,241,0.10), transparent 60%);"></div>

  <!-- Header -->
  <header class="border-b border-white/5 bg-slate-950/70 backdrop-blur sticky top-0 z-20">
    <div class="mx-auto max-w-4xl px-4 h-14 flex items-center justify-between">
      <span class="flex items-center gap-2">
        <span class="grid place-items-center w-7 h-7 rounded-lg bg-brand-500 text-white font-bold text-xs">φ</span>
        <span class="font-semibold text-sm">Phren</span>
      </span>
      <span id="student-label" class="text-xs text-slate-500">Student —</span>
    </div>
  </header>

  <main class="mx-auto max-w-4xl px-4 py-6">
    <!-- LIST SCREEN -->
    <div id="screen-list" class="screen space-y-4">
      <h2 class="text-lg font-semibold">📚 Your Lessons</h2>
      <div id="lesson-list" class="space-y-2"></div>
      <div id="list-empty" class="text-center py-12 text-slate-500 hidden">
        <p class="text-lg">No lessons yet</p>
        <p class="text-sm mt-1">Your teacher hasn't generated any lessons for this week.</p>
      </div>
    </div>

    <!-- LESSON SCREEN -->
    <div id="screen-lesson" class="screen hidden space-y-6">
      <div class="flex items-center gap-3">
        <button id="back-btn" class="text-sm text-slate-400 hover:text-slate-200 transition">← Back</button>
        <div>
          <h2 id="lesson-title" class="text-lg font-semibold"></h2>
          <p id="lesson-meta" class="text-xs text-slate-500"></p>
        </div>
      </div>
      <div id="lesson-progress" class="w-full bg-slate-800 rounded-full h-1.5">
        <div id="progress-fill" class="bg-brand-500 h-1.5 rounded-full transition-all duration-300" style="width:0%"></div>
      </div>
      <div id="step-area" class="space-y-4"></div>
      <div id="step-controls" class="flex gap-3 pt-2"></div>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="screen-results" class="screen hidden space-y-6">
      <h2 class="text-lg font-semibold">📊 Results</h2>
      <div id="results-score" class="text-center py-4"></div>
      <div id="results-breakdown" class="space-y-2"></div>
      <button id="results-back-btn" class="px-4 py-2 bg-brand-500 hover:bg-brand-400 text-white text-sm font-semibold rounded-lg transition">
        Back to Lessons
      </button>
    </div>
  </main>

  <script src="student.js"></script>
</body>
</html>
